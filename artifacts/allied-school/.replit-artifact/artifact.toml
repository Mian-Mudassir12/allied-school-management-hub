kind = "web"
previewPath = "/"
title = "Allied School Management"
version = "1.0.0"
id = "artifacts/allied-school"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21811

[services.development]
run = "pnpm --filter @workspace/allied-school run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/allied-school", "run", "build" ]
publicDir = "artifacts/allied-school/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21811"
BASE_PATH = "/"
