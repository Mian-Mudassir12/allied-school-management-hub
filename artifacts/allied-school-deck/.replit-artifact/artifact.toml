kind = "slides"
previewPath = "/allied-school-deck/"
title = "Allied School Deck"
version = "1.0.0"
id = "artifacts/allied-school-deck"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/allied-school-deck/" ]
localPort = 20672

[services.development]
run = "pnpm --filter @workspace/allied-school-deck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/allied-school-deck", "run", "build" ]
publicDir = "artifacts/allied-school-deck/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20672"
BASE_PATH = "/allied-school-deck/"
