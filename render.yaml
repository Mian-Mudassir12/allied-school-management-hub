services:
  - type: web
    name: allied-school-management-hub
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm run replit:prepare
    startCommand: NODE_ENV=production pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
      - key: DATABASE_URL
        fromDatabase:
          name: allied-school-db
          property: connectionString
      - key: SCHOOL_ALLOWED_IPS
        sync: false

databases:
  - name: allied-school-db
    plan: free
